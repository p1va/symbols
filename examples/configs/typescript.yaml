language-servers:
  typescript:
    command: npx -y typescript-language-server --stdio
    extensions:
      .js: javascript
      .mjs: javascript
      .cjs: javascript
      .jsx: javascriptreact
      .ts: typescript
      .mts: typescript
      .cts: typescript
      .tsx: typescriptreact
      .json: json
      .jsonc: json
    workspace_files:
      - 'tsconfig.json'
      - 'jsconfig.json'
    # Each preload entry may be an exact path or a glob pattern.
    # A glob pattern resolves to the first matching file to keep memory bounded.
    preload_files:
      - './src/{index,main}.ts'
    diagnostics:
      strategy: 'push'
      wait_timeout_ms: 2000
